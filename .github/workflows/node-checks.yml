name: Static app checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check core procurement rules
        run: node --test engine.test.mjs
      - name: Check browser module syntax
        run: |
          node --check app.js
          node --check engine.mjs
